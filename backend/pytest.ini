[pytest]
# Pytest configuration for Indigo backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directory to search for tests
testpaths = tests

# Minimum version
minversion = 7.0

# Output configuration
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Coverage report
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # Disable warnings
    --disable-warnings
    # Strict markers
    --strict-markers
    # Show print statements
    -s

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions/classes
    integration: Integration tests for multi-component flows
    slow: Tests that take more than 1 second
    requires_db: Tests that require database connection
    requires_qdrant: Tests that require Qdrant vector store
    requires_redis: Tests that require Redis
    requires_openai: Tests that require OpenAI API key

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__init__.py
    */config.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
